version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mwcode
      POSTGRES_PASSWORD: mwcode
      POSTGRES_DB: mwcode
    ports:
      - '5432:5432'
    volumes:
      - mwcode-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mwcode"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgres://mwcode:mwcode@db:5432/mwcode
      PORT: 3100
      MWCODE_PROVIDER: openrouter
      MWCODE_MODEL: openrouter/auto
    ports:
      - '3100:3100'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mwcode-db: